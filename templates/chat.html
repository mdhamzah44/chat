<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* Base styles */
body {
  font-family: Arial, sans-serif;
  background-color: #f8f9fa;
  margin: 0;
  padding: 0;
  font-size: 1rem; /* base font */
}

h2, h3 {
  font-weight: 600;
  text-align: center;
  margin-bottom: 0.75rem;
}

/* Users list */
ul#users li {
  cursor: pointer;
  padding: 0.75rem 1rem;
  margin-bottom: 0.5rem;
  background-color: #fff;
  border-radius: 0.5rem;
  border: 1px solid #dee2e6;
  font-size: 1rem;
  transition: background-color 0.2s;
}
ul#users li:hover {
  background-color: #e9ecef;
}

/* Chat container */
#messages {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 1rem;
  background-color: #ffffff;
  border-radius: 0.75rem;
  border: 1px solid #dee2e6;
}

/* Chat bubble */
.message {
  max-width: 80%;
  padding: 0.7rem 1rem;
  margin: 0.5rem 0;
  border-radius: 1rem;
  word-wrap: break-word;
  font-size: 1rem;
}
.message.sent {
  align-self: flex-end;
  background-color: #0d6efd;
  color: white;
  border-bottom-right-radius: 0.5rem;
}
.message.received {
  align-self: flex-start;
  background-color: #e9ecef;
  color: black;
  border-bottom-left-radius: 0.5rem;
}

/* Message Input */
.input-group input {
  padding: 0.75rem;
  font-size: 1rem;
}

/* Buttons */
.btn {
  font-size: 1rem;
  padding: 0.6rem 1rem;
}

/* Responsive rules for mobile screens */
@media (max-width: 576px) {

  body {
    font-size: 1.1rem; /* slightly bigger on phones */
  }

  h2, h3 {
    font-size: 1.4rem;
  }

  ul#users li {
    font-size: 1rem;
    padding: 0.85rem 1rem;
  }

  .message {
    font-size: 1rem;
    padding: 0.85rem 1.1rem;
  }

  .input-group input {
    font-size: 1rem;
    padding: 0.85rem;
  }

  .btn {
    font-size: 1rem;
    padding: 0.75rem 1rem;
  }
}
  </style>
</head>
<body class="bg-light d-flex flex-column vh-100">

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="home">Chat App</a>
    <div class="ms-auto">
      <button class="btn btn-outline-danger btn-sm" id="logoutBtn">Logout</button>
    </div>
  </div>
</nav>

<div class="container-fluid d-flex flex-column flex-grow-1 py-2">
  <h3 id="chatWith" class="text-center mb-2"></h3>
  <div id="messages" class="flex-grow-1 overflow-auto border rounded p-3 bg-white mb-2"></div>
  <div class="input-group">
    <input id="messageInput" type="text" class="form-control" placeholder="Type a message">
    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
  // Redirect to login if not logged in
  if(!localStorage.getItem("user")){
    window.location = "/";
  }

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("user");
    localStorage.removeItem("chatWith");
    window.location = "/";
  });

  // Press Enter to send message
  const input = document.getElementById("messageInput");
  input.addEventListener("keypress", function(event){
    if(event.key === "Enter"){
      event.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
