<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - Users</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color:rgb(175, 161, 161);
}

/* Navbar */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.navbar h2{
  font-size:22px;
}

.logout-btn{
  padding:8px 15px;
  border-radius:8px;
  border:2px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.logout-btn:hover{
  background:white;
  color:#764ba2;
}

/* Main Container */
.main-container{
  display:flex;
  justify-content:center;
  padding:50px 20px;
}

.users-card{
  width:100%;
  max-width:500px;
  padding:30px;
  border-radius:20px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.users-card h3{
  text-align:center;
  margin-bottom:25px;
  font-size:26px;
}

/* Users List */
#users{
  list-style:none;
}

#users li{
  padding:12px 15px;
  margin-bottom:12px;
  border-radius:10px;
  background: rgba(255,255,255,0.2);
  cursor:pointer;
  transition:0.3s;
}

#users li:hover{
  background:white;
  color:#764ba2;
  transform:translateX(5px);
}

/* Responsive */
@media(max-width:480px){
  .navbar{
    padding:12px 15px;
  }

  .users-card{
    padding:20px;
  }

  .users-card h3{
    font-size:22px;
  }
}

</style>
</head>

<body>

<script>
  // Redirect to login if not logged in
  if(!localStorage.getItem("user")){
    window.location = "/";
  }
</script>

<!-- Navbar -->
<div class="navbar">
  <h2>Chat App</h2>
  <button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<!-- Main Section -->
<div class="main-container">
  <div class="users-card">
    <h3>All Users</h3>
    <ul id="users"></ul>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

<script>
  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("user");
    localStorage.removeItem("chatWith");
    window.location = "/";
  });
</script>

</body>
</html>
