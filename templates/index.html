<!DOCTYPE html>
<html>
<head>
  <title>Chat App Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
    /* Base styles */
body {
  font-family: Arial, sans-serif;
  background-color: #f8f9fa;
  margin: 0;
  padding: 0;
  font-size: 1rem; /* base font */
}

h2, h3 {
  font-weight: 600;
  text-align: center;
  margin-bottom: 0.75rem;
}

/* Users list */
ul#users li {
  cursor: pointer;
  padding: 0.75rem 1rem;
  margin-bottom: 0.5rem;
  background-color: #fff;
  border-radius: 0.5rem;
  border: 1px solid #dee2e6;
  font-size: 1rem;
  transition: background-color 0.2s;
}
ul#users li:hover {
  background-color: #e9ecef;
}

/* Chat container */
#messages {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 1rem;
  background-color: #ffffff;
  border-radius: 0.75rem;
  border: 1px solid #dee2e6;
}

/* Chat bubble */
.message {
  max-width: 80%;
  padding: 0.7rem 1rem;
  margin: 0.5rem 0;
  border-radius: 1rem;
  word-wrap: break-word;
  font-size: 1rem;
}
.message.sent {
  align-self: flex-end;
  background-color: #0d6efd;
  color: white;
  border-bottom-right-radius: 0.5rem;
}
.message.received {
  align-self: flex-start;
  background-color: #e9ecef;
  color: black;
  border-bottom-left-radius: 0.5rem;
}

/* Message Input */
.input-group input {
  padding: 0.75rem;
  font-size: 1rem;
}

/* Buttons */
.btn {
  font-size: 1rem;
  padding: 0.6rem 1rem;
}

/* Responsive rules for mobile screens */
@media (max-width: 576px) {

  body {
    font-size: 1.1rem; /* slightly bigger on phones */
  }

  h2, h3 {
    font-size: 1.4rem;
  }

  ul#users li {
    font-size: 1rem;
    padding: 0.85rem 1rem;
  }

  .message {
    font-size: 1rem;
    padding: 0.85rem 1.1rem;
  }

  .input-group input {
    font-size: 1rem;
    padding: 0.85rem;
  }

  .btn {
    font-size: 1rem;
    padding: 0.75rem 1rem;
  }
}
  </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<script>
  // Redirect to home if already logged in
  if(localStorage.getItem("user")){
    window.location = "home";
  }
</script>

<div class="card p-4 shadow w-100" style="max-width: 400px;">
  <h3 class="text-center mb-3">Login</h3>
  <input id="username" class="form-control mb-2" placeholder="Username">
  <input id="password" type="password" class="form-control mb-3" placeholder="Password">
  <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>
  <hr>
  <button class="btn btn-success w-100" onclick="signup()">Signup</button>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
