<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Login</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Login Container */
.login-container{
    width:90%;
    max-width:380px;
    background: rgba(255,255,255,0.15);
    padding:40px 30px;
    border-radius:20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    color:white;
}

/* Heading */
.login-container h2{
    text-align:center;
    margin-bottom:30px;
    font-size:28px;
}

/* Input Group */
.input-group{
    margin-bottom:20px;
}

.input-group label{
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

/* Input Focus Effect */
.input-group input:focus{
    box-shadow: 0 0 8px #fff;
}

/* Remember + Forgot */
.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin-bottom:20px;
}

.options a{
    color:#fff;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

/* Button */
.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#fff;
    color:#764ba2;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#ddd;
}

/* Sign Up Text */
.signup{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.signup a{
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

.signup a:hover{
    text-decoration:underline;
}

/* Responsive */
@media(max-width:480px){
    .login-container{
        padding:30px 20px;
    }
}

</style>
</head>
<body>
<script>
  // Redirect to home if already logged in
  if(localStorage.getItem("user")){
    window.location = "home";
  }
</script>
<div class="login-container">
    <h2>Login</h2>
    <form>
        <div class="input-group">
            <label>Email</label>
            <input type="text" id="username" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn" onclick="login()">Login</button>

        <div class="signup">
            Don't have an account? <a href="#" onclick="signup()">Sign Up</a>
        </div>
    </form>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
